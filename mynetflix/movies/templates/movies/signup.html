{% extends 'movies/base.html' %} {% block content %}
<h2>회원가입</h2>

<div class="signup-info" style="margin-bottom: 20px">
  <p>새 계정을 만들려면 아래 정보를 정확히 입력해주세요.</p>
  <p>이메일 주소는 로그인 시 사용됩니다.</p>
</div>

<form method="post">
  {% csrf_token %} {{ form.as_p }}
  <button type="submit">회원가입</button>
</form>

<p>이미 회원이신가요? <a href="{% url 'login' %}">로그인</a></p>
{% endblock %}

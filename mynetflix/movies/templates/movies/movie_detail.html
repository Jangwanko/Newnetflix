<h2>{{ movie.title }}</h2>

<video width="640" height="360" controls>
    <source src="{{ movie.video_file.url }}" type="video/mp4">
    Your browser does not support the video tag.
</video>

<p>{{ movie.description }}</p>

<!-- 기능 버튼 영역 -->
<div style="margin-top: 20px;">
    <a href="{% url 'edit_movie' movie.id %}">영상 수정</a> |
    <a href="{% url 'delete_movie' movie.id %}" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a> |
    <a href="{% url 'movie_list' %}">목록으로 돌아가기</a>
</div>

<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}My Netflix{% endblock %}</title>
    <style>
      .btn {
        padding: 8px 16px;
        background-color: #007bff;
        color: white;
        border: none;
        text-decoration: none;
        border-radius: 4px;
        margin: 4px;
        cursor: pointer;
      }
      .btn.delete {
        background-color: #dc3545;
      }
      nav a,
      nav span,
      nav form {
        vertical-align: middle;
        display: inline-block;
      }
      nav span {
        color: #333;
        margin-right: 10px;
        font-weight: bold;
      }
      .message {
        margin-top: 16px;
        padding: 10px;
        border-radius: 5px;
        background-color: #e6ffe6;
        color: #2e662e;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>My Netflix Clone</h1>
      <nav>
        <a href="{% url 'home' %}" class="btn">홈</a>
        <a href="{% url 'movie_list' %}" class="btn">영화 목록</a>
        <a href="{% url 'upload_movie' %}" class="btn">영상 업로드</a>

        {% if user.is_authenticated %}
        <span>{{ user.username }}님 환영합니다</span>
        <form action="{% url 'logout' %}" method="post" style="display: inline">
          {% csrf_token %}
          <button type="submit" class="btn">로그아웃</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="btn">로그인</a>
        <a href="{% url 'signup' %}" class="btn">회원가입</a>
        {% endif %}
      </nav>
    </header>

    <main>
      {% if messages %} {% for message in messages %}
      <div class="message">{{ message }}</div>
      {% endfor %} {% endif %} {% block content %}{% endblock %}
    </main>
  </body>
</html>

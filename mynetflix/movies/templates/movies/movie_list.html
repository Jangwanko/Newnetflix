<!-- movies/templates/movies/movie_list.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List</title>
</head>
<body>
    <h1>Movies</h1>
    <ul>
        {% for movie in movies %}
            <li><a href="{% url 'movie_detail' movie.id %}">{{ movie.title }}</a> - {{ movie.genre }} ({{ movie.year }})</li>
        {% endfor %}
    </ul>
    <a href="{% url 'upload_movie' %}">Upload New Movie</a>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>비디오 업로드</title>
</head>
<body>
    <h1>비디오 업로드</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <p>제목: <input type="text" name="title"></p>
        <p>설명: <textarea name="description"></textarea></p>
        <p>파일: <input type="file" name="video_file"></p>
        <button type="submit">업로드</button>
    </form>
</body>
</html>

{% extends 'movies/base.html' %} {% block content %}
<h1>비디오 업로드</h1>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <p>제목: <input type="text" name="title" /></p>
  <p>설명: <textarea name="description"></textarea></p>
  <p>파일: <input type="file" name="video_file" /></p>
  <button type="submit" class="btn">업로드</button>
</form>
<a href="{% url 'movie_list' %}" class="btn">목록으로 돌아가기</a>
{% endblock %}

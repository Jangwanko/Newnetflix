<h2>영상 수정</h2>
<form method="post">
    {% csrf_token %}
    <label for="title">제목:</label>
    <input type="text" name="title" value="{{ movie.title }}"><br>
    <label for="description">설명:</label>
    <textarea name="description">{{ movie.description }}</textarea><br>
    <button type="submit">저장</button>
</form>

services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app-network

  backend:
    image: ${APP_IMAGE:-newnetflix-backend:latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      ENABLE_REDIS_CACHE: ${ENABLE_REDIS_CACHE:-True}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-600}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-60}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    volumes:
      - static-data:/code/staticfiles
      - media-data:/code/media
    networks:
      - app-network

  worker:
    image: ${APP_IMAGE:-newnetflix-backend:latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      ENABLE_REDIS_CACHE: ${ENABLE_REDIS_CACHE:-True}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      APP_ROLE: worker
      VIDEO_WORKER_POLL_INTERVAL: ${VIDEO_WORKER_POLL_INTERVAL:-3}
    volumes:
      - media-data:/code/media
    networks:
      - app-network

  frontend:
    image: ${FRONTEND_IMAGE:-newnetflix-frontend:latest}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static-data:/usr/share/nginx/html/static:ro
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:
  static-data:
  media-data:

networks:
  app-network:
    driver: bridge

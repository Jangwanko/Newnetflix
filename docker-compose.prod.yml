services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  web:
    image: ${APP_IMAGE:-newnetflix-web:latest}
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-600}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-60}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    volumes:
      - static-data:/code/staticfiles
      - media-data:/code/media
    networks:
      - app-network

  worker:
    image: ${APP_IMAGE:-newnetflix-web:latest}
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      APP_ROLE: worker
      VIDEO_WORKER_POLL_INTERVAL: ${VIDEO_WORKER_POLL_INTERVAL:-3}
    volumes:
      - media-data:/code/media
    networks:
      - app-network

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static-data:/code/staticfiles:ro
      - media-data:/code/media:ro
    depends_on:
      - web
    networks:
      - app-network

volumes:
  postgres-data:
  static-data:
  media-data:

networks:
  app-network:
    driver: bridge

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-myflix
  namespace: observability
data:
  myflix-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "targets": [{ "expr": "sum(rate(myflix_http_requests_total[5m]))", "legendFormat": "RPS" }],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "targets": [{ "expr": "sum(rate(myflix_http_requests_total{status=~\"5..\"}[5m])) / clamp_min(sum(rate(myflix_http_requests_total[5m])), 1)", "legendFormat": "5xx Ratio" }],
          "title": "Error Ratio",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "targets": [{ "expr": "max(pg_up{job=\"postgres-exporter\"})", "legendFormat": "pg_up" }],
          "title": "Database Availability",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["myflix", "portfolio"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "MyFlix Overview",
      "version": 1
    }

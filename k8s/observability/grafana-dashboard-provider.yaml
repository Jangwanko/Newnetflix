apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: observability
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: myflix
        orgId: 1
        folder: MyFlix
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards

apiVersion: v1
kind: ConfigMap
metadata:
  name: myflix-config
  namespace: myflix
data:
  DJANGO_DEBUG: "True"
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,web,myflix,web.myflix.svc.cluster.local"
  DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:18080,http://127.0.0.1:18080"

  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "Django_DB"
  DB_USER: "backend_user"

  ENABLE_REDIS_CACHE: "False"
  USE_S3: "False"
  SESSION_COOKIE_SECURE: "False"
  CSRF_COOKIE_SECURE: "False"

  GUNICORN_WORKERS: "2"
  GUNICORN_TIMEOUT: "600"
  GUNICORN_GRACEFUL_TIMEOUT: "60"
  VIDEO_WORKER_POLL_INTERVAL: "3"

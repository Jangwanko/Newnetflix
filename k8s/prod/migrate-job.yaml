apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: myflix
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      serviceAccountName: myflix-app
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: myflix-app:latest
          env:
            - name: RUN_MIGRATIONS
              value: "true"
            - name: RUN_COLLECTSTATIC
              value: "true"
          envFrom:
            - configMapRef:
                name: myflix-config
            - secretRef:
                name: myflix-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: staticfiles
              mountPath: /code/staticfiles
      volumes:
        - name: tmp
          emptyDir: {}
        - name: staticfiles
          emptyDir: {}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: myflix
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      serviceAccountName: myflix-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: myflix-app:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: RUN_MIGRATIONS
              value: "false"
            - name: RUN_COLLECTSTATIC
              value: "true"
          envFrom:
            - configMapRef:
                name: myflix-config
            - secretRef:
                name: myflix-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /livez
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: staticfiles
              mountPath: /code/staticfiles
      volumes:
        - name: tmp
          emptyDir: {}
        - name: staticfiles
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: myflix
  labels:
    app: web
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 8000
      targetPort: 8000

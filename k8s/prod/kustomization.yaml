apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: myflix

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - cluster-issuer.yaml
  - secret-store.yaml
  - external-secret.yaml
  - configmap.yaml
  - redis.yaml
  - networkpolicy.yaml
  - web.yaml
  - worker.yaml
  - hpa-web.yaml
  - hpa-worker.yaml
  - pdb-web.yaml
  - pdb-worker.yaml
  - servicemonitor-web.yaml
  - ingress.yaml

images:
  - name: myflix-app
    newName: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/myflix-prod-app
    newTag: latest

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  red-alerts.yml: |
    groups:
      - name: myflix-red
        rules:
          - alert: MyflixHigh5xxRate
            expr: |
              (
                sum(rate(myflix_http_requests_total{status=~"5.."}[5m]))
                /
                clamp_min(sum(rate(myflix_http_requests_total[5m])), 1)
              ) > 0.01
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Myflix 5xx error ratio is above 1%"

          - alert: MyflixHighLatencyP95
            expr: |
              histogram_quantile(
                0.95,
                sum(rate(myflix_http_request_duration_seconds_bucket[5m])) by (le)
              ) > 0.25
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Myflix API p95 latency is above 250ms"

          - alert: MyflixHighLatencyP99
            expr: |
              histogram_quantile(
                0.99,
                sum(rate(myflix_http_request_duration_seconds_bucket[5m])) by (le)
              ) > 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Myflix API p99 latency is above 1s"

          - alert: MovieUploadFailures
            expr: increase(myflix_movie_upload_requests_total{result="error"}[10m]) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Movie upload errors are increasing"

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: "myflix-web"
        metrics_path: /metrics
        static_configs:
          - targets: ["web.myflix.svc.cluster.local:8000"]
      - job_name: "postgres-exporter"
        static_configs:
          - targets: ["postgres-exporter.myflix.svc.cluster.local:9187"]

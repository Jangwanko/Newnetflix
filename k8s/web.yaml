apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: myflix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/newnetflix:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: myflix-config
            - secretRef:
                name: myflix-secret
          volumeMounts:
            - name: static
              mountPath: /code/staticfiles
            - name: media
              mountPath: /code/media
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: static
          persistentVolumeClaim:
            claimName: static-data
        - name: media
          persistentVolumeClaim:
            claimName: media-data
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: myflix
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 8000
      targetPort: 8000

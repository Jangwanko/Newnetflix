{% extends 'base.html' %}
{% block title %}로그인{% endblock %}
{% block content %}
<section class="card">
  <h2>로그인</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">로그인</button>
  </form>
  <p style="margin-top: 12px;">계정이 없으면 <a href="{% url 'signup' %}">회원가입</a>을 먼저 진행하세요.</p>
</section>
{% endblock %}

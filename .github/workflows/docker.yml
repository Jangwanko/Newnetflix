name: CI (Local-Safe)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: Django_DB
          POSTGRES_USER: backend_user
          POSTGRES_PASSWORD: backend_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U backend_user -d Django_DB"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checks and tests
        env:
          DJANGO_SECRET_KEY: test-secret
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost
          DB_NAME: Django_DB
          DB_USER: backend_user
          DB_PASSWORD: backend_user
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          ENABLE_REDIS_CACHE: "True"
          REDIS_URL: redis://127.0.0.1:6379/1
          SESSION_COOKIE_SECURE: "False"
          CSRF_COOKIE_SECURE: "False"
        run: |
          python manage.py check
          python manage.py test movies posts users

  infra-validate:
    runs-on: ubuntu-latest
    if: ${{ false }} # local-safe mode: keep IaC files as reference only (disabled by default)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check

      - name: Terraform init (no backend)
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  build-local-image:
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image (no push)
        run: docker build -f docker/backend.Dockerfile -t newnetflix:ci-${{ github.sha }} .

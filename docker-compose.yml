version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: Django_DB
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: backend_user
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

  web:
    build: .
    env_file:
      - .env
    command: gunicorn myflix.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/static/
    depends_on:
      - db
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static/
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: